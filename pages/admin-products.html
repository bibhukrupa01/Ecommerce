<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Products — DRIP YARD">
    <title>Admin Products — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <button class="btn btn-icon btn-secondary" style="display:none" id="sidebar-toggle"
                        onclick="toggleAdminSidebar()">☰</button>
                    <h1>Products</h1>
                    <p style="color:var(--text-muted);font-size:0.9rem">Manage your product catalog</p>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openModal('add-product-modal')">+ Add Product</button>
            </div>
            <div class="glass" style="padding:24px">
                <div id="products-table"></div>
            </div>
        </main>
    </div>

    <!-- Add Product Modal -->
    <div class="modal-overlay" id="add-product-modal" onclick="if(event.target===this)closeModal('add-product-modal')">
        <div class="glass"
            style="padding:32px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;margin:auto;border-radius:var(--radius-lg)">
            <div class="flex-between" style="margin-bottom:24px">
                <h3>Add New Product</h3><button onclick="closeModal('add-product-modal')"
                    style="font-size:1.5rem;color:var(--text-muted)">×</button>
            </div>
            <form id="add-product-form">
                <div class="form-group"><label class="form-label">Product Name</label><input class="form-input"
                        id="ap-name" required></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Price ($)</label><input class="form-input"
                            type="number" step="0.01" id="ap-price" required></div>
                    <div class="form-group"><label class="form-label">Original Price ($)</label><input
                            class="form-input" type="number" step="0.01" id="ap-orig"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Category</label>
                        <select class="form-input" id="ap-cat" required>
                            <option value="hoodies">Hoodies</option>
                            <option value="tshirts">T-Shirts</option>
                            <option value="jackets">Jackets</option>
                            <option value="pants">Pants</option>
                            <option value="accessories">Accessories</option>
                            <option value="sets">Sets</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Badge</label><input class="form-input"
                            id="ap-badge" placeholder="e.g. New, Hot, Limited"></div>
                </div>
                <div class="form-group"><label class="form-label">Description</label><textarea class="form-input"
                        id="ap-desc" rows="3"></textarea></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Add Product</button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('sidebar-container').innerHTML = getAdminSidebarHTML('admin-products.html');
        initBurgerMenu();

        function renderProducts() {
            const products = getProducts();
            document.getElementById('products-table').innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Product</th><th>Price</th><th>Category</th><th>Rating</th><th>Badge</th><th>Actions</th></tr></thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td><strong>${p.name}</strong><br><span style="font-size:0.75rem;color:var(--text-muted)">${p.brand}</span></td>
                  <td>$${p.price.toFixed(2)} ${p.originalPrice ? '<br><span style="font-size:0.75rem;color:var(--text-muted);text-decoration:line-through">$' + p.originalPrice.toFixed(2) + '</span>' : ''}</td>
                  <td>${p.category}</td>
                  <td><span style="color:var(--gold)">★</span> ${p.rating}</td>
                  <td>${p.badge ? `<span class="badge badge-red">${p.badge}</span>` : '—'}</td>
                  <td><button class="btn-ghost" style="font-size:0.8rem;color:var(--red-primary)" onclick="if(confirm('Delete ${p.name}?')){deleteProduct(${p.id});renderProducts();showToast('Product deleted');}">Delete</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-top:12px">${products.length} products total</p>
      `;
        }
        renderProducts();

        document.getElementById('add-product-form').addEventListener('submit', function (e) {
            e.preventDefault();
            addProduct({
                name: document.getElementById('ap-name').value,
                brand: 'DRIP YARD',
                price: parseFloat(document.getElementById('ap-price').value),
                originalPrice: document.getElementById('ap-orig').value ? parseFloat(document.getElementById('ap-orig').value) : null,
                category: document.getElementById('ap-cat').value,
                badge: document.getElementById('ap-badge').value || null,
                desc: document.getElementById('ap-desc').value,
                image: '',
                colors: ['#c41e3a', '#111'],
                sizes: ['S', 'M', 'L', 'XL'],
                isNew: true
            });
            closeModal('add-product-modal');
            this.reset();
            renderProducts();
            showToast('Product added successfully!');
        });
    </script>
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        @media(max-width:768px) {
            #sidebar-toggle {
                display: flex !important
            }
        }
    </style>
</body>

</html>
