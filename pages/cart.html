<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your shopping cart at DRIP YARD">
    <title>Cart — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:32px;padding-bottom:60px">
            <h1 style="font-size:2.5rem;margin-bottom:32px">Your <span class="text-red">Cart</span></h1>
            <div id="cart-content"></div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        initBurgerMenu();

        function renderCart() {
            const container = document.getElementById('cart-content');

            // Not logged in
            if (!isLoggedIn()) {
                container.innerHTML = `
          <div style="text-align:center;padding:80px 20px">
            <div style="font-size:4rem;margin-bottom:16px">🔒</div>
            <h2 style="font-size:1.5rem;margin-bottom:12px">Please log in first</h2>
            <p style="color:var(--text-secondary);margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto">Log in to your DRIP YARD account to add items to your cart and start shopping.</p>
            <a href="login.html" class="btn btn-primary">Login to Continue</a>
            <p style="margin-top:12px;font-size:0.85rem;color:var(--text-muted)">Don't have an account? <a href="signup.html" style="color:var(--gold)">Sign Up</a></p>
          </div>`;
                return;
            }

            // Empty cart
            if (cart.length === 0) {
                container.innerHTML = `
          <div style="text-align:center;padding:80px 20px">
            <div style="font-size:4rem;margin-bottom:16px">🛒</div>
            <h2 style="font-size:1.5rem;margin-bottom:12px">Your cart is empty</h2>
            <p style="color:var(--text-secondary);margin-bottom:24px">Looks like you haven't added anything yet. Explore our collection!</p>
            <a href="category.html" class="btn btn-primary">Start Shopping</a>
          </div>`;
                return;
            }

            // Has items
            const subtotal = getCartTotal();
            const tax = +(subtotal * 0.08).toFixed(2);
            const shipping = subtotal >= 100 ? 0 : 5.99;
            const total = +(subtotal + tax + shipping).toFixed(2);

            let itemsHTML = '';
            cart.forEach(item => {
                itemsHTML += `
          <div class="glass-card" style="padding:20px;margin-bottom:16px">
            <div style="display:flex;gap:20px;align-items:center">
              <div style="width:100px;height:120px;border-radius:8px;background:linear-gradient(135deg,#1a1a1a,#2a1015);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bebas Neue';color:rgba(196,30,58,0.2)">DY</div>
              <div style="flex:1">
                <p style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">${item.brand || 'DRIP YARD'}</p>
                <h4 style="margin-bottom:4px">${item.name}</h4>
                <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">${item.size ? 'Size: ' + item.size + ' · ' : ''}${item.color ? 'Color: ' + item.color : ''}</p>
                <div style="display:flex;align-items:center;gap:16px">
                  <div class="glass" style="display:inline-flex;align-items:center;gap:12px;padding:6px 12px;border-radius:6px">
                    <button onclick="updateCartQty(${item.id}, ${item.qty - 1});${item.qty <= 1 ? `removeFromCart(${item.id});` : ''}renderCart()" style="color:var(--text-secondary);padding:2px 6px">−</button>
                    <span style="font-weight:600">${item.qty}</span>
                    <button onclick="updateCartQty(${item.id}, ${item.qty + 1});renderCart()" style="color:var(--text-secondary);padding:2px 6px">+</button>
                  </div>
                  <span style="font-weight:700;font-size:1.1rem">$${(item.price * item.qty).toFixed(2)}</span>
                  <button onclick="removeFromCart(${item.id});renderCart()" style="margin-left:auto;color:var(--text-muted);font-size:0.85rem" class="btn-ghost">Remove</button>
                </div>
              </div>
            </div>
          </div>`;
            });

            container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start" id="cart-layout">
          <div>${itemsHTML}</div>
          <div class="glass" style="padding:28px;position:sticky;top:96px">
            <h3 style="font-size:1.3rem;margin-bottom:20px;font-family:var(--font-accent)">Order Summary</h3>
            <div style="font-size:0.9rem;color:var(--text-secondary)">
              <div style="display:flex;justify-content:space-between;padding:8px 0"><span>Subtotal (${cart.reduce((s, i) => s + i.qty, 0)} items)</span><span style="color:var(--text-primary)">$${subtotal.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:8px 0"><span>Shipping</span><span style="color:#22c55e">${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:8px 0"><span>Tax</span><span style="color:var(--text-primary)">$${tax.toFixed(2)}</span></div>
            </div>
            <div style="display:flex;gap:8px;margin:16px 0">
              <input type="text" class="form-input" placeholder="Coupon code" style="flex:1;padding:10px 14px">
              <button class="btn btn-secondary btn-sm">Apply</button>
            </div>
            <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;margin-top:8px">
              <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700">
                <span>Total</span><span style="color:var(--white);font-family:'Bebas Neue';font-size:1.8rem">$${total.toFixed(2)}</span>
              </div>
            </div>
            <a href="checkout.html" class="btn btn-primary" style="width:100%;margin-top:20px">Proceed to Checkout</a>
            <a href="category.html" class="btn btn-ghost" style="width:100%;margin-top:8px;text-align:center">← Continue Shopping</a>
          </div>
        </div>`;
        }

        renderCart();
    </script>
    <style>
        @media(max-width:768px) {
            #cart-layout {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</body>

</html>
