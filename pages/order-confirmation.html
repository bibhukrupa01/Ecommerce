<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order confirmed — DRIP YARD">
    <title>Order Confirmed — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:40px;padding-bottom:60px;max-width:800px">
            <div id="confirm-content"></div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        initBurgerMenu();

        const orderId = getUrlParam('order');
        const order = orderId ? getOrderById(orderId) : getOrders()[0];
        const cc = document.getElementById('confirm-content');

        if (!order) {
            cc.innerHTML = '<div style="text-align:center;padding:80px"><h2>No order found</h2><p style="color:var(--text-secondary);margin:12px 0 24px">We couldn\'t find your order.</p><a href="category.html" class="btn btn-primary">Shop Now</a></div>';
        } else {
            cc.innerHTML = `
        <div style="text-align:center;margin-bottom:40px">
          <div style="width:60px;height:60px;border-radius:50%;background:rgba(34,197,94,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:#22c55e">✓</div>
          <h1 style="font-size:2.5rem;margin-bottom:8px">Order <span class="text-red">Confirmed</span></h1>
          <p style="color:var(--text-secondary);font-size:1rem">Order <strong style="color:var(--gold)">#${order.id}</strong> has been placed successfully</p>
        </div>
        <div class="glass" style="padding:32px;margin-bottom:24px">
          <h3 style="font-family:var(--font-accent);font-size:1.1rem;margin-bottom:24px">Order Progress</h3>
          <div style="display:flex;justify-content:space-between;position:relative">
            <div style="position:absolute;top:14px;left:5%;right:5%;height:2px;background:rgba(255,255,255,0.08)"><div style="height:100%;background:#22c55e;width:15%"></div></div>
            ${['Order Placed', 'Processing', 'Shipped', 'Delivered'].map((s, i) => `
              <div style="text-align:center;z-index:1;flex:1">
                <div style="width:28px;height:28px;border-radius:50%;background:${i === 0 ? '#22c55e' : i === 1 ? 'var(--gold)' : 'rgba(255,255,255,0.08)'};display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:0.7rem;color:white">${i === 0 ? '✓' : i + 1}</div>
                <p style="font-size:0.75rem;color:${i <= 1 ? 'var(--text-primary)' : 'var(--text-muted)'}">${s}</p>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="glass" style="padding:28px;margin-bottom:24px">
          <h3 style="font-family:var(--font-accent);font-size:1.1rem;margin-bottom:16px">Items Ordered</h3>
          ${order.items.map(item => `
            <div style="display:flex;gap:16px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
              <div style="width:60px;height:72px;border-radius:8px;background:linear-gradient(135deg,#1a1a1a,#2a1015);flex-shrink:0"></div>
              <div style="flex:1"><h4 style="font-size:0.95rem">${item.name}</h4><p style="font-size:0.8rem;color:var(--text-muted)">${item.size ? 'Size: ' + item.size : ''} ${item.color ? '· Color: ' + item.color : ''} · Qty: ${item.qty}</p></div>
              <span style="font-weight:600">$${(item.price * item.qty).toFixed(2)}</span>
            </div>
          `).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" id="confirm-grid">
          <div class="glass" style="padding:24px">
            <h4 style="font-size:0.9rem;margin-bottom:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Shipping To</h4>
            <p style="font-size:0.95rem;line-height:1.8">${order.address.name}<br>${order.address.street}<br>${order.address.city}${order.address.state ? ', ' + order.address.state : ''} ${order.address.zip}<br>${order.address.country}<br>${order.address.phone || ''}</p>
          </div>
          <div class="glass" style="padding:24px">
            <h4 style="font-size:0.9rem;margin-bottom:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Payment Summary</h4>
            <div style="font-size:0.9rem;color:var(--text-secondary)">
              <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Subtotal</span><span style="color:var(--text-primary)">$${order.subtotal.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Shipping</span><span style="color:#22c55e">${order.shipping === 0 ? 'Free' : '$' + order.shipping.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Tax</span><span style="color:var(--text-primary)">$${order.tax.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:8px;font-weight:700;font-size:1rem"><span>Total</span><span style="color:var(--white)">$${order.total.toFixed(2)}</span></div>
            </div>
          </div>
        </div>
        <div style="text-align:center;margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <a href="my-orders.html" class="btn btn-primary">View My Orders</a>
          <a href="category.html" class="btn btn-secondary">Continue Shopping</a>
        </div>
      `;
        }
    </script>
    <style>
        @media(max-width:768px) {
            #confirm-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</body>

</html>
