<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard — DRIP YARD">
    <title>Admin Dashboard — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <button class="btn btn-icon btn-secondary" style="display:none" id="sidebar-toggle"
                        onclick="toggleAdminSidebar()">☰</button>
                    <h1>Dashboard</h1>
                    <p style="color:var(--text-muted);font-size:0.9rem">Welcome back, Admin. Here's what's happening.
                    </p>
                </div>
            </div>
            <div id="dash-content"></div>
        </main>
    </div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('sidebar-container').innerHTML = getAdminSidebarHTML('admin-dashboard.html');
        initBurgerMenu();

        const orders = getOrders();
        const users = getAllUsers().filter(u => u.role === 'user');
        const products = getProducts();
        const revenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + o.total, 0);
        const avgOrder = orders.length > 0 ? revenue / orders.length : 0;

        // Category stats
        const catCounts = {};
        orders.forEach(o => o.items.forEach(i => {
            const p = products.find(pp => pp.id === i.id);
            if (p) catCounts[p.category] = (catCounts[p.category] || 0) + i.qty;
        }));
        const totalItems = Object.values(catCounts).reduce((a, b) => a + b, 1);

        document.getElementById('dash-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card glass-card"><h4>Revenue</h4><div class="value">$${revenue.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}</div><p class="change up">↑ From ${orders.length} orders</p></div>
        <div class="stat-card glass-card"><h4>Orders</h4><div class="value">${orders.length}</div><p class="change up">${orders.filter(o => o.status === 'processing').length} processing</p></div>
        <div class="stat-card glass-card"><h4>Customers</h4><div class="value">${users.length}</div><p class="change up">Registered users</p></div>
        <div class="stat-card glass-card"><h4>Avg. Order Value</h4><div class="value">$${avgOrder.toFixed(2)}</div><p class="change">${products.length} products</p></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;margin-bottom:32px" id="chart-grid">
        <div class="glass" style="padding:24px">
          <h4 style="margin-bottom:20px">Revenue by Month</h4>
          <div style="display:flex;gap:4px;align-items:flex-end;height:200px;padding-top:20px">
            ${['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'].map(m => {
            const h = 20 + Math.random() * 80;
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;background:linear-gradient(to top,var(--red-primary),var(--red-dark));border-radius:4px 4px 0 0;height:${h}%"></div><span style="font-size:0.65rem;color:var(--text-muted)">${m}</span></div>`;
        }).join('')}
          </div>
        </div>
        <div class="glass" style="padding:24px">
          <h4 style="margin-bottom:20px">Top Categories</h4>
          <div style="display:flex;flex-direction:column;gap:16px">
            ${Object.entries(catCounts).sort((a, b) => b[1] - a[1]).slice(0, 4).map(([cat, count]) => {
            const pct = Math.round(count / totalItems * 100);
            const colors = { hoodies: 'var(--red-primary)', jackets: 'var(--gold)', tshirts: 'var(--red-light)', accessories: '#22c55e', pants: '#3b82f6', sets: '#a855f7' };
            return `<div><div class="flex-between" style="margin-bottom:4px"><span style="font-size:0.85rem">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span><span style="font-size:0.85rem;color:var(--text-muted)">${pct}%</span></div><div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${colors[cat] || 'var(--red-primary)'};border-radius:3px"></div></div></div>`;
        }).join('')}
          </div>
        </div>
      </div>
      <div class="glass" style="padding:24px">
        <div class="flex-between" style="margin-bottom:16px"><h4>Recent Orders</h4><a href="admin-orders.html" style="color:var(--red-primary);font-size:0.85rem">View All →</a></div>
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>
              ${orders.slice(0, 5).map(o => {
            const u = getAllUsers().find(u => u.id === o.userId);
            return `<tr><td style="color:var(--gold)">#${o.id}</td><td>${u ? u.firstName + ' ' + u.lastName.charAt(0) + '.' : 'Unknown'}</td><td>$${o.total.toFixed(2)}</td><td>${statusBadge(o.status)}</td><td>${formatDate(o.date)}</td></tr>`;
        }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
    </script>
    <style>
        @media(max-width:768px) {
            #sidebar-toggle {
                display: flex !important
            }

            #chart-grid {
                grid-template-columns: 1fr !important
            }
        }
    </style>
</body>

</html>
