<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View product details at DRIP YARD">
    <title>Product Details — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:32px;padding-bottom:60px">
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:24px">
                <a href="../index.html" style="color:var(--text-muted)">Home</a> / <a href="category.html"
                    style="color:var(--text-muted)">Shop</a> / <span class="text-red"
                    id="breadcrumb-name">Product</span>
            </p>
            <div id="product-content"></div>
            <!-- Related Products -->
            <div style="margin-top:80px">
                <h2 style="font-size:2rem;margin-bottom:32px">You May Also <span class="text-red">Like</span></h2>
                <div id="related-products" class="grid"
                    style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px"></div>
            </div>
        </div>
    </div>
    <div id="footer-container"></div>
    <div id="cart-btn-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        document.getElementById('cart-btn-container').innerHTML = getCartButtonHTML();
        initBurgerMenu();

        const productId = getUrlParam('id');
        const product = getProductById(productId);
        const container = document.getElementById('product-content');

        if (!product) {
            container.innerHTML = '<div style="text-align:center;padding:80px"><h2>Product not found</h2><p style="color:var(--text-secondary);margin-top:12px">The product you are looking for does not exist.</p><a href="category.html" class="btn btn-primary" style="margin-top:24px">Browse Products</a></div>';
        } else {
            document.getElementById('breadcrumb-name').textContent = product.name;
            document.title = product.name + ' — DRIP YARD';

            const reviews = getProductReviews(product.id);
            const discount = product.originalPrice ? Math.round((1 - product.price / product.originalPrice) * 100) : 0;
            const colorNames = { '#c41e3a': 'Heist Red', '#111': 'Black', '#f0e6d3': 'Cream', '#2a3a5c': 'Navy', '#2a2015': 'Dark Brown', '#3a3a2a': 'Olive', '#1a2a10': 'Forest Green' };

            let selectedSize = product.sizes ? product.sizes[Math.floor(product.sizes.length / 2)] : '';
            let selectedColor = product.colors ? product.colors[0] : '';
            let qty = 1;

            container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start" id="product-detail">
          <div>
            <div class="glass" style="aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border-radius:var(--radius-lg)">
              <div style="font-family:'Bebas Neue';font-size:3rem;color:rgba(196,30,58,0.2);letter-spacing:6px">DRIP YARD</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
              <div class="glass" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border-color:var(--red-primary);font-size:0.7rem;color:var(--text-muted)">Front</div>
              <div class="glass" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.7rem;color:var(--text-muted)">Back</div>
              <div class="glass" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.7rem;color:var(--text-muted)">Side</div>
              <div class="glass" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.7rem;color:var(--text-muted)">Detail</div>
            </div>
          </div>
          <div>
            ${product.badge ? `<span class="badge badge-red" style="margin-bottom:12px">${product.badge}</span>` : ''}
            <p style="font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">${product.brand}</p>
            <h1 style="font-size:2.5rem;margin-bottom:8px">${product.name}</h1>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
              <span style="color:var(--gold);font-size:1rem">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5 - Math.floor(product.rating))}</span>
              <span style="color:var(--text-muted);font-size:0.9rem">${product.rating} (${product.reviewCount} reviews)</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:24px">
              <span style="font-family:'Bebas Neue';font-size:2.5rem;color:var(--white)">$${product.price.toFixed(2)}</span>
              ${product.originalPrice ? `<span style="font-size:1.1rem;color:var(--text-muted);text-decoration:line-through">$${product.originalPrice.toFixed(2)}</span><span class="badge badge-green">${discount}% OFF</span>` : ''}
            </div>
            <p style="color:var(--text-secondary);line-height:1.7;margin-bottom:28px">${product.desc || ''}</p>
            ${product.colors ? `<div style="margin-bottom:24px">
              <p style="font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Color: <strong style="color:var(--text-primary)" id="color-name">${colorNames[selectedColor] || ''}</strong></p>
              <div style="display:flex;gap:10px" id="color-btns">
                ${product.colors.map(c => `<button onclick="selectColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};border:2px solid ${c === selectedColor ? 'var(--red-primary)' : 'transparent'};cursor:pointer" data-color="${c}"></button>`).join('')}
              </div>
            </div>` : ''}
            ${product.sizes ? `<div style="margin-bottom:28px">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                <p style="font-size:0.85rem;color:var(--text-muted);text-transform:uppercase">Select Size</p>
                <a href="#" style="font-size:0.85rem;color:var(--red-primary)">Size Guide</a>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap" id="size-btns">
                ${product.sizes.map(s => `<button onclick="selectSize('${s}')" class="btn ${s === selectedSize ? 'btn-primary' : 'btn-secondary'} btn-sm" data-size="${s}">${s}</button>`).join('')}
              </div>
            </div>` : ''}
            <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
              <div class="glass" style="display:flex;align-items:center;gap:16px;padding:8px 16px;border-radius:var(--radius-sm)">
                <button onclick="changeQty(-1)" style="font-size:1.2rem;color:var(--text-secondary);padding:4px 8px">−</button>
                <span id="qty-display" style="font-weight:600;min-width:20px;text-align:center">1</span>
                <button onclick="changeQty(1)" style="font-size:1.2rem;color:var(--text-secondary);padding:4px 8px">+</button>
              </div>
              <button class="btn btn-primary btn-lg" style="flex:1" onclick="addProductToCart()">Add to Cart</button>
              <button class="btn btn-secondary btn-icon" style="width:52px;height:52px" onclick="toggleWishlist({id:${product.id},name:'${product.name.replace(/'/g, "\\'")}',brand:'${product.brand}',price:${product.price}})">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1.1L12 21.3l7.8-7.8 1-1.1a5.5 5.5 0 000-7.8z"/></svg>
              </button>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px">
              <span class="tag">🚀 Free Shipping</span><span class="tag">↩️ 30-Day Returns</span><span class="tag">🔒 Secure Checkout</span>
            </div>
            <div class="tabs">
              <button class="tab-btn active" data-tab="desc-tab">Description</button>
              <button class="tab-btn" data-tab="spec-tab">Specifications</button>
              <button class="tab-btn" data-tab="review-tab">Reviews (${reviews.length})</button>
            </div>
            <div id="desc-tab" class="tab-content active">
              <p style="color:var(--text-secondary);line-height:1.8;font-size:0.9rem">${product.desc || 'No description available.'}</p>
            </div>
            <div id="spec-tab" class="tab-content">
              <div style="font-size:0.9rem;color:var(--text-secondary)">
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span>Brand</span><span style="color:var(--text-primary)">${product.brand}</span></div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span>Category</span><span style="color:var(--text-primary)">${product.category}</span></div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span>Available Sizes</span><span style="color:var(--text-primary)">${(product.sizes || []).join(', ')}</span></div>
                <div style="display:flex;justify-content:space-between;padding:10px 0"><span>Rating</span><span style="color:var(--text-primary)">${product.rating}/5</span></div>
              </div>
            </div>
            <div id="review-tab" class="tab-content">
              ${reviews.length > 0 ? reviews.map(r => `
                <div class="review-card glass-card" style="margin-bottom:12px">
                  <div class="review-header">
                    <div class="review-avatar">${r.userName.charAt(0)}</div>
                    <div class="review-meta"><h4>${r.userName}</h4><p>${formatDate(r.date)}</p></div>
                    <span style="margin-left:auto;color:var(--gold)">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                  </div>
                  <p class="review-body">${r.text}</p>
                </div>
              `).join('') : '<p style="color:var(--text-muted);padding:20px 0">No reviews yet. Be the first!</p>'}
              <a href="review-submission.html?product=${product.id}" class="btn btn-secondary" style="margin-top:16px">Write a Review</a>
            </div>
          </div>
        </div>
      `;

            // Related products (same category, different id)
            const related = getProducts().filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
            if (related.length === 0) {
                const others = getProducts().filter(p => p.id !== product.id).slice(0, 4);
                document.getElementById('related-products').innerHTML = others.map(p => renderProductCard(p)).join('');
            } else {
                document.getElementById('related-products').innerHTML = related.map(p => renderProductCard(p)).join('');
            }

            initTabs();

            window.selectSize = function (s) { selectedSize = s; document.querySelectorAll('#size-btns button').forEach(b => { b.classList.remove('btn-primary'); b.classList.add('btn-secondary'); if (b.dataset.size === s) { b.classList.remove('btn-secondary'); b.classList.add('btn-primary'); } }); };
            window.selectColor = function (c) { selectedColor = c; const cn = { '#c41e3a': 'Heist Red', '#111': 'Black', '#f0e6d3': 'Cream', '#2a3a5c': 'Navy', '#2a2015': 'Dark Brown', '#3a3a2a': 'Olive', '#1a2a10': 'Forest Green' }; document.getElementById('color-name').textContent = cn[c] || ''; document.querySelectorAll('#color-btns button').forEach(b => { b.style.borderColor = b.dataset.color === c ? 'var(--red-primary)' : 'transparent'; }); };
            window.changeQty = function (d) { qty = Math.max(1, qty + d); document.getElementById('qty-display').textContent = qty; };
            window.addProductToCart = function () {
                for (let i = 0; i < qty; i++) addToCart({ id: product.id, name: product.name, brand: product.brand, price: product.price, size: selectedSize, color: selectedColor });
            };
        }
    </script>
    <style>
        @media(max-width:768px) {
            #product-detail {
                grid-template-columns: 1fr !important;
                gap: 32px !important;
            }
        }
    </style>
</body>

</html>
