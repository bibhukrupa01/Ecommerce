<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your DRIP YARD account">
    <title>Login — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card glass">
            <div class="logo">
                <h2>DRIP <span>YARD</span></h2>
            </div>
            <h3>Welcome Back</h3>
            <p class="subtitle">Sign in to continue your heist</p>
            <div class="social-login">
                <button class="social-btn" onclick="showToast('Social login coming soon!','warning')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Google
                </button>
                <button class="social-btn" onclick="showToast('Social login coming soon!','warning')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    Facebook
                </button>
            </div>
            <div class="divider"><span>or</span></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="login-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="login-pass" placeholder="••••••••" required>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                    <label class="form-check"><input type="checkbox"><span
                            style="font-size:0.85rem;color:var(--text-secondary)">Remember me</span></label>
                    <a href="#" style="font-size:0.85rem;color:var(--red-primary)">Forgot password?</a>
                </div>
                <div id="login-error"
                    style="display:none;color:var(--red-primary);font-size:0.85rem;margin-bottom:12px;text-align:center">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="signup.html">Sign Up</a></p>
            <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-top:12px">Demo:
                admin@dripyard.com / admin123</p>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const user = loginUser(email, pass);
            if (user) {
                showToast('Welcome back, ' + user.firstName + '!');
                setTimeout(() => {
                    if (user.role === 'admin') window.location.href = 'admin-dashboard.html';
                    else window.location.href = '../index.html';
                }, 800);
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').textContent = 'Invalid email or password. Try again.';
            }
        });
    </script>
</body>

</html>
