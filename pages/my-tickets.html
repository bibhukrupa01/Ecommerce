<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your support tickets at DRIP YARD">
    <title>My Tickets — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:32px;padding-bottom:60px">
            <div class="flex-between" style="margin-bottom:32px;flex-wrap:wrap;gap:12px">
                <h1 style="font-size:2.5rem">My <span class="text-red">Tickets</span></h1>
                <a href="help-submission.html" class="btn btn-primary btn-sm">+ New Ticket</a>
            </div>
            <div id="tickets-content"></div>
        </div>
    </div>
    <div id="footer-container"></div>
    <div id="cart-btn-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        document.getElementById('cart-btn-container').innerHTML = getCartButtonHTML();
        initBurgerMenu();

        const tc = document.getElementById('tickets-content');
        if (!isLoggedIn()) {
            tc.innerHTML = '<div style="text-align:center;padding:80px"><div style="font-size:4rem;margin-bottom:16px">🔒</div><h2>Please log in</h2><p style="color:var(--text-secondary);margin:12px 0 24px">Log in to view your tickets.</p><a href="login.html" class="btn btn-primary">Login</a></div>';
        } else {
            const tickets = getMyTickets();
            if (tickets.length === 0) {
                tc.innerHTML = '<div style="text-align:center;padding:60px" class="glass"><div style="font-size:3rem;margin-bottom:16px">🎫</div><h3>No tickets yet</h3><p style="color:var(--text-secondary);margin:8px 0 24px">Need help? Create a support ticket.</p><a href="help-submission.html" class="btn btn-primary">Create Ticket</a></div>';
            } else {
                tc.innerHTML = tickets.map(t => `
          <div class="glass-card" style="padding:24px;margin-bottom:16px">
            <div class="flex-between" style="margin-bottom:8px;flex-wrap:wrap;gap:8px">
              <h4 style="font-size:1rem">${t.subject}</h4>
              ${statusBadge(t.status)}
            </div>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">${t.description.substring(0, 120)}${t.description.length > 120 ? '...' : ''}</p>
            <div style="display:flex;gap:16px;font-size:0.8rem;color:var(--text-muted)">
              <span>📂 ${t.category}</span>
              <span>📅 ${formatDate(t.date)}</span>
              <span style="color:${t.priority === 'high' ? 'var(--red-primary)' : t.priority === 'low' ? '#22c55e' : 'var(--gold)'}">● ${t.priority.charAt(0).toUpperCase() + t.priority.slice(1)} priority</span>
              ${t.orderId ? `<span>🔗 ${t.orderId}</span>` : ''}
            </div>
          </div>
        `).join('');
            }
        }
    </script>
</body>

</html>
