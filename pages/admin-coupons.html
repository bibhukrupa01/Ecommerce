<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Coupons — DRIP YARD">
    <title>Admin Coupons — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <button class="btn btn-icon btn-secondary" style="display:none" id="sidebar-toggle"
                        onclick="toggleAdminSidebar()">☰</button>
                    <h1>Coupons</h1>
                    <p style="color:var(--text-muted);font-size:0.9rem">Manage discount coupons</p>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openModal('add-coupon-modal')">+ Create Coupon</button>
            </div>
            <div class="glass" style="padding:24px">
                <div id="coupons-table"></div>
            </div>
        </main>
    </div>

    <!-- Add Coupon Modal -->
    <div class="modal-overlay" id="add-coupon-modal" onclick="if(event.target===this)closeModal('add-coupon-modal')">
        <div class="glass" style="padding:32px;max-width:500px;width:90%;margin:auto;border-radius:var(--radius-lg)">
            <div class="flex-between" style="margin-bottom:24px">
                <h3>Create Coupon</h3><button onclick="closeModal('add-coupon-modal')"
                    style="font-size:1.5rem;color:var(--text-muted)">×</button>
            </div>
            <form id="add-coupon-form">
                <div class="form-group"><label class="form-label">Coupon Code</label><input class="form-input"
                        id="ac-code" placeholder="e.g. HEIST20" required style="text-transform:uppercase"></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Type</label>
                        <select class="form-input" id="ac-type">
                            <option value="percentage">Percentage (%)</option>
                            <option value="fixed">Fixed Amount ($)</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Value</label><input class="form-input"
                            type="number" id="ac-value" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Min Order ($)</label><input class="form-input"
                            type="number" id="ac-min" value="0"></div>
                    <div class="form-group"><label class="form-label">Max Uses</label><input class="form-input"
                            type="number" id="ac-max" placeholder="Unlimited"></div>
                </div>
                <div class="form-group"><label class="form-label">Expires At</label><input class="form-input"
                        type="date" id="ac-exp" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Create Coupon</button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('sidebar-container').innerHTML = getAdminSidebarHTML('admin-coupons.html');
        initBurgerMenu();

        function renderCoupons() {
            const coupons = getCoupons();
            document.getElementById('coupons-table').innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Code</th><th>Discount</th><th>Min Order</th><th>Usage</th><th>Expires</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              ${coupons.map(c => {
                const expired = c.expiresAt && new Date(c.expiresAt) < new Date();
                const maxedOut = c.maxUses && c.usedCount >= c.maxUses;
                const active = c.active && !expired && !maxedOut;
                return `<tr>
                  <td><code style="color:var(--gold);font-weight:700;background:rgba(212,168,83,0.1);padding:4px 10px;border-radius:4px">${c.code}</code></td>
                  <td>${c.type === 'percentage' ? c.value + '%' : '$' + c.value}</td>
                  <td>$${c.minOrder}</td>
                  <td>${c.usedCount}${c.maxUses ? '/' + c.maxUses : '/∞'}</td>
                  <td>${formatDate(c.expiresAt)}</td>
                  <td><span class="badge badge-${active ? 'green' : 'red'}">${active ? 'Active' : 'Inactive'}</span></td>
                  <td><button class="btn-ghost" style="font-size:0.8rem;color:var(--red-primary)" onclick="if(confirm('Delete this coupon?')){deleteCoupon(${c.id});renderCoupons();showToast('Coupon deleted');}">Delete</button></td>
                </tr>`;
            }).join('')}
            </tbody>
          </table>
        </div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-top:12px">${coupons.length} coupons total</p>
      `;
        }
        renderCoupons();

        document.getElementById('add-coupon-form').addEventListener('submit', function (e) {
            e.preventDefault();
            createCoupon({
                code: document.getElementById('ac-code').value.toUpperCase(),
                type: document.getElementById('ac-type').value,
                value: parseFloat(document.getElementById('ac-value').value),
                minOrder: parseFloat(document.getElementById('ac-min').value) || 0,
                maxUses: document.getElementById('ac-max').value ? parseInt(document.getElementById('ac-max').value) : null,
                expiresAt: document.getElementById('ac-exp').value,
                active: true
            });
            closeModal('add-coupon-modal');
            this.reset();
            renderCoupons();
            showToast('Coupon created!');
        });
    </script>
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        @media(max-width:768px) {
            #sidebar-toggle {
                display: flex !important
            }
        }
    </style>
</body>

</html>
