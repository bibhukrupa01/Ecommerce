<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment failed - DRIP YARD">
    <title>Payment Failed — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:60px;padding-bottom:60px;text-align:center;max-width:600px">
            <div class="glass" style="padding:48px 32px">
                <div
                    style="width:80px;height:80px;border-radius:50%;background:rgba(196,30,58,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.5rem">
                    ✗</div>
                <h1 style="font-size:2rem;margin-bottom:8px">Payment <span class="text-red">Failed</span></h1>
                <p style="color:var(--text-secondary);margin-bottom:32px">Something went wrong with your payment. Don't
                    worry — your cart items are safe.</p>
                <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
                    <a href="checkout.html" class="btn btn-primary">Try Again</a>
                    <a href="category.html" class="btn btn-secondary">Continue Shopping</a>
                </div>
                <p style="margin-top:24px;font-size:0.85rem;color:var(--text-muted)">Need help? <a
                        href="help-submission.html" style="color:var(--red-primary)">Contact Support</a></p>
            </div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        initBurgerMenu();
    </script>
</body>

</html>
