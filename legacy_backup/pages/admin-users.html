<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Users — DRIP YARD">
    <title>Admin Users — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <button class="btn btn-icon btn-secondary" style="display:none" id="sidebar-toggle"
                        onclick="toggleAdminSidebar()">☰</button>
                    <h1>Users</h1>
                    <p style="color:var(--text-muted);font-size:0.9rem">Manage registered users</p>
                </div>
            </div>
            <div class="glass" style="padding:24px">
                <div id="users-table"></div>
            </div>
        </main>
    </div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('sidebar-container').innerHTML = getAdminSidebarHTML('admin-users.html');
        initBurgerMenu();

        const users = getAllUsers();
        const orders = getOrders();
        document.getElementById('users-table').innerHTML = `
      <div class="table-wrapper">
        <table class="table">
          <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Orders</th><th>Total Spent</th></tr></thead>
          <tbody>
            ${users.map(u => {
            const userOrders = orders.filter(o => o.id && o.userId === u.id);
            const totalSpent = userOrders.reduce((s, o) => s + o.total, 0);
            return `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div style="width:32px;height:32px;border-radius:50%;background:rgba(196,30,58,0.15);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--red-primary);font-size:0.8rem">${u.firstName.charAt(0)}</div>
                    <strong>${u.firstName} ${u.lastName}</strong>
                  </div>
                </td>
                <td>${u.email}</td>
                <td><span class="badge badge-${u.role === 'admin' ? 'red' : 'blue'}">${u.role}</span></td>
                <td>${formatDate(u.joined)}</td>
                <td>${userOrders.length}</td>
                <td>$${totalSpent.toFixed(2)}</td>
              </tr>`;
        }).join('')}
          </tbody>
        </table>
      </div>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-top:12px">${users.length} users total</p>
    `;
    </script>
    <style>
        @media(max-width:768px) {
            #sidebar-toggle {
                display: flex !important
            }
        }
    </style>
</body>

</html>
