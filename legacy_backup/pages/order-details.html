<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order details at DRIP YARD">
    <title>Order Details — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:32px;padding-bottom:60px;max-width:900px">
            <div id="order-content"></div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        initBurgerMenu();

        const orderId = getUrlParam('id');
        const order = orderId ? getOrderById(orderId) : null;
        const oc = document.getElementById('order-content');

        if (!order) {
            oc.innerHTML = '<div style="text-align:center;padding:80px"><h2>Order not found</h2><p style="color:var(--text-secondary);margin:12px 0 24px">We couldn\'t find that order.</p><a href="my-orders.html" class="btn btn-primary">My Orders</a></div>';
        } else {
            const steps = ['processing', 'shipped', 'delivered'];
            const stepIdx = steps.indexOf(order.status);

            oc.innerHTML = `
        <a href="my-orders.html" style="color:var(--text-muted);font-size:0.85rem;display:inline-block;margin-bottom:16px">← Back to Orders</a>
        <div class="flex-between" style="margin-bottom:24px;flex-wrap:wrap;gap:12px">
          <div><h1 style="font-size:2rem">Order #${order.id}</h1><p style="color:var(--text-muted);font-size:0.9rem">Placed on ${formatDate(order.date)}</p></div>
          ${statusBadge(order.status)}
        </div>
        <!-- Timeline -->
        <div class="glass" style="padding:28px;margin-bottom:24px">
          <h3 style="font-family:var(--font-accent);font-size:1rem;margin-bottom:20px">Order Timeline</h3>
          <div style="display:flex;justify-content:space-between;position:relative">
            <div style="position:absolute;top:14px;left:5%;right:5%;height:2px;background:rgba(255,255,255,0.08)"><div style="height:100%;background:var(--red-primary);width:${stepIdx >= 0 ? Math.min(100, stepIdx * 50) : 0}%"></div></div>
            ${steps.map((s, i) => `
              <div style="text-align:center;z-index:1;flex:1">
                <div style="width:28px;height:28px;border-radius:50%;background:${i <= stepIdx ? 'var(--red-primary)' : 'rgba(255,255,255,0.08)'};display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:0.7rem;color:white">${i <= stepIdx ? '✓' : i + 1}</div>
                <p style="font-size:0.8rem;color:${i <= stepIdx ? 'var(--text-primary)' : 'var(--text-muted)'}">${s.charAt(0).toUpperCase() + s.slice(1)}</p>
              </div>
            `).join('')}
          </div>
        </div>
        <!-- Items -->
        <div class="glass" style="padding:28px;margin-bottom:24px">
          <h3 style="font-family:var(--font-accent);font-size:1rem;margin-bottom:16px">Items (${order.items.reduce((s, i) => s + i.qty, 0)})</h3>
          ${order.items.map(item => `
            <div style="display:flex;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
              <div style="width:70px;height:85px;border-radius:8px;background:linear-gradient(135deg,#1a1a1a,#2a1015);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';color:rgba(196,30,58,0.15);font-size:0.8rem">DY</div>
              <div style="flex:1">
                <h4 style="font-size:0.95rem;margin-bottom:2px">${item.name}</h4>
                <p style="font-size:0.8rem;color:var(--text-muted)">${item.size ? 'Size: ' + item.size : ''} ${item.color ? '· Color: ' + item.color : ''} · Qty: ${item.qty}</p>
              </div>
              <span style="font-weight:700">$${(item.price * item.qty).toFixed(2)}</span>
            </div>
          `).join('')}
        </div>
        <!-- Shipping & Payment -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" id="info-grid">
          <div class="glass" style="padding:28px">
            <h3 style="font-family:var(--font-accent);font-size:1rem;margin-bottom:16px">Shipping Address</h3>
            <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.8">
              ${order.address.name}<br>${order.address.street}<br>${order.address.city}${order.address.state ? ', ' + order.address.state : ''} ${order.address.zip}<br>${order.address.country}<br>${order.address.phone}
            </p>
          </div>
          <div class="glass" style="padding:28px">
            <h3 style="font-family:var(--font-accent);font-size:1rem;margin-bottom:16px">Payment Summary</h3>
            <div style="font-size:0.9rem;color:var(--text-secondary)">
              <div style="display:flex;justify-content:space-between;padding:6px 0"><span>Payment Method</span><span style="color:var(--text-primary)">${order.payment}</span></div>
              <div style="display:flex;justify-content:space-between;padding:6px 0"><span>Subtotal</span><span style="color:var(--text-primary)">$${order.subtotal.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:6px 0"><span>Shipping</span><span style="color:#22c55e">${order.shipping === 0 ? 'Free' : '$' + order.shipping.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:6px 0"><span>Tax</span><span style="color:var(--text-primary)">$${order.tax.toFixed(2)}</span></div>
              <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:8px;font-weight:700;font-size:1.1rem"><span>Total</span><span style="color:var(--white)">$${order.total.toFixed(2)}</span></div>
            </div>
          </div>
        </div>
      `;
        }
    </script>
    <style>
        @media(max-width:768px) {
            #info-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</body>

</html>
