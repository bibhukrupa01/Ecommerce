<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment successful - DRIP YARD">
    <title>Payment Success — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:60px;padding-bottom:60px;text-align:center;max-width:600px">
            <div id="confetti-container"
                style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999"></div>
            <div class="glass" style="padding:48px 32px">
                <div
                    style="width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.5rem">
                    ✓</div>
                <h1 style="font-size:2rem;margin-bottom:8px">Payment <span class="text-red">Successful!</span></h1>
                <p style="color:var(--text-secondary);margin-bottom:32px">Your heist pack is being prepared for
                    delivery.</p>
                <div class="glass-card" style="padding:20px;margin-bottom:24px;text-align:left">
                    <div style="display:flex;justify-content:space-between;padding:8px 0"><span
                            style="color:var(--text-muted)">Order ID</span><span
                            style="color:var(--gold);font-weight:600" id="order-id"></span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0"><span
                            style="color:var(--text-muted)">Date</span><span id="order-date"></span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0"><span
                            style="color:var(--text-muted)">Total</span><span style="font-weight:700;font-size:1.1rem"
                            id="order-total"></span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0"><span
                            style="color:var(--text-muted)">Payment</span><span id="order-payment"></span></div>
                </div>
                <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
                    <a href="my-orders.html" class="btn btn-primary">View My Orders</a>
                    <a href="category.html" class="btn btn-secondary">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
    <div id="footer-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        initBurgerMenu();

        const orderId = getUrlParam('order');
        const order = orderId ? getOrderById(orderId) : getOrders()[0];
        if (order) {
            document.getElementById('order-id').textContent = '#' + order.id;
            document.getElementById('order-date').textContent = formatDate(order.date);
            document.getElementById('order-total').textContent = '$' + order.total.toFixed(2);
            document.getElementById('order-payment').textContent = order.payment;
        }

        // Confetti animation
        const container = document.getElementById('confetti-container');
        const colors = ['#c41e3a', '#d4a853', '#22c55e', '#3b82f6', '#f0e6d3'];
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.style.cssText = `position:absolute;width:${6 + Math.random() * 8}px;height:${6 + Math.random() * 8}px;background:${colors[Math.floor(Math.random() * colors.length)]};left:${Math.random() * 100}%;top:-10px;border-radius:${Math.random() > 0.5 ? '50%' : '2px'};animation:confettiFall ${2 + Math.random() * 3}s ease-in forwards;animation-delay:${Math.random() * 1}s;opacity:${0.6 + Math.random() * 0.4};`;
            container.appendChild(c);
        }
    </script>
    <style>
        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</body>

</html>
