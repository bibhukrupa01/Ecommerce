<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your DRIP YARD profile">
    <title>My Profile — DRIP YARD</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar-container"></div>
    <div class="page-wrapper">
        <div class="container" style="padding-top:32px;padding-bottom:60px;max-width:900px">
            <div id="profile-content"></div>
        </div>
    </div>
    <div id="footer-container"></div>
    <div id="cart-btn-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.getElementById('navbar-container').innerHTML = getNavbarHTML();
        document.getElementById('footer-container').innerHTML = getFooterHTML();
        document.getElementById('cart-btn-container').innerHTML = getCartButtonHTML();
        initBurgerMenu();

        const pc = document.getElementById('profile-content');
        if (!isLoggedIn()) {
            pc.innerHTML = '<div style="text-align:center;padding:80px"><div style="font-size:4rem;margin-bottom:16px">🔒</div><h2>Please log in</h2><p style="color:var(--text-secondary);margin:12px 0 24px">Log in to view your profile.</p><a href="login.html" class="btn btn-primary">Login</a></div>';
        } else {
            const user = getCurrentUser();
            const orders = getMyOrders();
            const wl = JSON.parse(localStorage.getItem('dripyard_wishlist') || '[]');
            const reviews = getReviews().filter(r => r.userId === user.id);

            pc.innerHTML = `
        <div class="profile-header glass">
          <div class="profile-avatar">${user.firstName.charAt(0)}</div>
          <h2 style="font-size:1.8rem;margin-bottom:4px">${user.firstName} ${user.lastName}</h2>
          <p style="color:var(--text-secondary)">${user.email}</p>
          <p style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Member since ${formatDate(user.joined)}</p>
        </div>
        <div class="stats-grid" style="margin-bottom:32px">
          <div class="stat-card glass-card"><h4>Total Orders</h4><div class="value">${orders.length}</div></div>
          <div class="stat-card glass-card"><h4>Wishlist Items</h4><div class="value">${wl.length}</div></div>
          <div class="stat-card glass-card"><h4>Reviews Given</h4><div class="value">${reviews.length}</div></div>
          <div class="stat-card glass-card"><h4>Total Spent</h4><div class="value" style="color:var(--gold)">$${orders.reduce((s, o) => s + o.total, 0).toFixed(0)}</div></div>
        </div>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">
          <a href="my-orders.html" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">📦</div>
            <div><h4 style="font-size:0.95rem">My Orders</h4><p style="font-size:0.8rem;color:var(--text-muted)">Track and manage orders</p></div>
          </a>
          <a href="wishlist.html" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">❤️</div>
            <div><h4 style="font-size:0.95rem">Wishlist</h4><p style="font-size:0.8rem;color:var(--text-muted)">Your saved items</p></div>
          </a>
          <a href="account-settings.html" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">⚙️</div>
            <div><h4 style="font-size:0.95rem">Settings</h4><p style="font-size:0.8rem;color:var(--text-muted)">Account preferences</p></div>
          </a>
          <a href="my-tickets.html" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">🎫</div>
            <div><h4 style="font-size:0.95rem">Support Tickets</h4><p style="font-size:0.8rem;color:var(--text-muted)">Get help</p></div>
          </a>
          <a href="review-submission.html" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">⭐</div>
            <div><h4 style="font-size:0.95rem">Write a Review</h4><p style="font-size:0.8rem;color:var(--text-muted)">Share your feedback</p></div>
          </a>
          <a href="#" onclick="logoutUser();window.location.href='login.html'" class="glass-card" style="padding:24px;display:flex;align-items:center;gap:16px">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(196,30,58,0.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">🚪</div>
            <div><h4 style="font-size:0.95rem">Logout</h4><p style="font-size:0.8rem;color:var(--text-muted)">Sign out securely</p></div>
          </a>
        </div>
      `;
        }
    </script>
</body>

</html>
